<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown bis 16:00 Uhr</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>

  <!-- Beweglicher Hintergrund: GIF/Bild als Fallback, Video falls vorhanden -->
  <div id="background"></div>
  <video id="bg-video" autoplay muted loop playsinline></video>
  <div id="overlay"></div>

  <!-- Hauptinhalt: drehender Ring mit Countdown darin, wechselnde Sätze darunter -->
  <main id="content">
    <div id="ring-wrap">
      <div id="ring"></div>

      <div id="countdown">
        <div class="unit">
          <span class="value" id="hours">00</span>
          <span class="label">Std</span>
        </div>
        <span class="separator">:</span>
        <div class="unit">
          <span class="value" id="minutes">00</span>
          <span class="label">Min</span>
        </div>
        <span class="separator">:</span>
        <div class="unit">
          <span class="value" id="seconds">00</span>
          <span class="label">Sek</span>
        </div>
      </div>
    </div>

    <p id="phrase"></p>
  </main>

  <!-- Finale um 16:00 Uhr -->
  <div id="finale" class="hidden">
    <h1 id="finale-message"></h1>
  </div>
  <canvas id="confetti"></canvas>

  <!-- Hintergrundmusik: einfach assets/music.mp3 ablegen -->
  <audio id="music" loop>
    <source src="assets/music.mp3" type="audio/mpeg" />
  </audio>

  <button id="sound-button" title="Musik an/aus">🔇</button>

  <script src="script.js?v=4"></script>
</body>
</html>
