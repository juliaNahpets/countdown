<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown bis 16:00 Uhr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>

  <!-- Beweglicher Hintergrund: GIF/Bild als Fallback, Video falls vorhanden -->
  <div id="background"></div>
  <video id="bg-video" autoplay muted loop playsinline></video>
  <div id="overlay"></div>

  <!-- Hauptinhalt: drehender Ring mit Countdown darin, wechselnde Sätze darunter -->
  <main id="content">
    <div id="ring-wrap">
      <div id="ring"></div>

      <div id="countdown">
        <div class="unit">
          <span class="value" id="hours">00</span>
          <span class="label">Std</span>
        </div>
        <span class="separator">:</span>
        <div class="unit">
          <span class="value" id="minutes">00</span>
          <span class="label">Min</span>
        </div>
        <span class="separator">:</span>
        <div class="unit">
          <span class="value" id="seconds">00</span>
          <span class="label">Sek</span>
        </div>
      </div>

      <!-- Wandel-Phase: ersetzt ab 16 Uhr den Countdown -->
      <div id="wandel" class="hidden">
        <p id="wandel-text"></p>
        <div class="q-portal-trigger q-portal-sphere" role="button" tabindex="0"><span class="q-portal-symbol"></span></div>
      </div>
    </div>

    <p id="phrase"></p>
  </main>

  <!-- Hintergrund-Sounds: zwei Wind-Tracks laufen abwechselnd in Endlosschleife -->
  <audio id="music" src="assets/wind-1.mp3" preload="auto"></audio>

  <button id="sound-button" title="Musik an/aus">🔇</button>

  <script src="script.js?v=7"></script>
</body>
</html>
